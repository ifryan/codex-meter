name: Bug report
description: Report a reproducible problem in Codex Meter
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include tokens, cookies, credentials, or a complete private Codex configuration.
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac model
      placeholder: macOS 14.6, MacBook Pro 14-inch (M2 Pro)
    validations:
      required: true
  - type: input
    id: codex
    attributes:
      label: Codex version
      description: Output of `codex --version`
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Redacted logs or screenshots only.
